name: Fortress secret scan
on: [push, pull_request]
jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets + untrusted plugin configs
        run: |
          fail=0
          if git grep -nE 'sbp_[A-Za-z0-9]{18,}|PGPASSWORD[[:space:]]*=[[:space:]]*["'"'"']?[A-Za-z0-9]{6,}' -- . ':(exclude)*hardening-preflight.mjs' ':(exclude)*fortress-guard.mjs' ':(exclude)*fortress-secret-scan.yml'; then
            echo "::error::management PAT or DB password found in tracked files"; fail=1; fi
          if git grep -nE 'extraKnownMarketplaces' -- '.claude' 2>/dev/null; then
            echo "::error::untrusted plugin marketplace in a .claude config"; fail=1; fi
          if git ls-files | grep -qE '(^|/)\.env$'; then
            echo "::error::a .env file is tracked by git"; fail=1; fi
          [ "$fail" = 0 ] && echo "fortress: clean" || exit 1
